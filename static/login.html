<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AIoT Smart Shelf — 登入</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f2744 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.bg-grid{
  position:fixed;inset:0;
  background-image:linear-gradient(rgba(59,130,246,.05) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(59,130,246,.05) 1px,transparent 1px);
  background-size:50px 50px;pointer-events:none;
}
.card{
  background:rgba(15,23,42,.95);border:1px solid rgba(59,130,246,.2);
  border-radius:20px;padding:44px 40px;width:100%;max-width:420px;
  backdrop-filter:blur(20px);box-shadow:0 25px 60px rgba(0,0,0,.5);
  position:relative;z-index:1;
}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{font-size:3rem;margin-bottom:10px}
.logo h1{font-size:1.5rem;font-weight:800;color:#f1f5f9;letter-spacing:-0.5px}
.logo p{font-size:.82rem;color:#64748b;margin-top:5px}
.badge{
  display:inline-block;background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:#fff;font-size:.65rem;font-weight:700;padding:3px 10px;
  border-radius:999px;letter-spacing:.5px;margin-top:6px;
}
.form-group{margin-bottom:18px}
.form-group label{
  display:block;font-size:.8rem;font-weight:600;color:#94a3b8;
  margin-bottom:7px;letter-spacing:.3px;text-transform:uppercase;
}
.form-group input{
  width:100%;background:#1e293b;border:1px solid #334155;
  border-radius:10px;color:#f1f5f9;font-size:.95rem;
  padding:12px 16px;outline:none;transition:border-color .2s,box-shadow .2s;
}
.form-group input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 3px rgba(59,130,246,.15);
}
.form-group input::placeholder{color:#475569}
.btn-login{
  width:100%;padding:13px;border-radius:10px;border:none;
  font-size:.95rem;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:#fff;transition:opacity .2s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:6px;
}
.btn-login:hover{opacity:.9}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.4;cursor:not-allowed}
.spinner{
  width:18px;height:18px;border:3px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{
  background:#450a0a;border:1px solid #dc2626;color:#fca5a5;
  border-radius:8px;padding:10px 14px;font-size:.83rem;
  margin-top:12px;display:none;text-align:center;
}
.divider{
  display:flex;align-items:center;gap:12px;margin:20px 0;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;background:#1e293b;
}
.divider span{font-size:.75rem;color:#475569;white-space:nowrap}
.demo-accounts{
  background:#0f172a;border:1px solid #1e293b;border-radius:10px;
  padding:14px;font-size:.78rem;color:#64748b;
}
.demo-accounts strong{color:#94a3b8;display:block;margin-bottom:8px}
.demo-row{
  display:flex;justify-content:space-between;padding:4px 0;
  border-bottom:1px solid #1e293b;
}
.demo-row:last-child{border-bottom:none}
.demo-role{color:#3b82f6;font-weight:600}
.footer{
  text-align:center;margin-top:24px;font-size:.72rem;color:#334155;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🍌</div>
    <h1>AIoT Smart Shelf</h1>
    <p>智慧貨架分散式監控系統</p>
    <span class="badge">v4.0 · Multi-Node</span>
  </div>

  <div class="form-group">
    <label>帳號</label>
    <input type="text" id="username" placeholder="輸入帳號" autocomplete="username"/>
  </div>
  <div class="form-group">
    <label>密碼</label>
    <input type="password" id="password" placeholder="輸入密碼" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>

  <button class="btn-login" id="login-btn" onclick="doLogin()">
    <span>登入系統</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <div class="error-msg" id="error-msg"></div>

  <div class="divider"><span>預設帳號</span></div>
  <div class="demo-accounts">
    <strong>測試帳號</strong>
    <div class="demo-row">
      <span>admin / admin123</span>
      <span class="demo-role">管理員</span>
    </div>
    <div class="demo-row">
      <span>user / user123</span>
      <span class="demo-role" style="color:#22c55e">普通用戶</span>
    </div>
  </div>
</div>

<div class="footer">AIoT Smart Shelf System © 2025 · CTMA IoT Lab</div>

<script>
async function doLogin() {
  const btn     = document.getElementById('login-btn');
  const spinner = document.getElementById('spinner');
  const errMsg  = document.getElementById('error-msg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) {
    errMsg.textContent = '請輸入帳號與密碼';
    errMsg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  spinner.style.display = 'block';
  errMsg.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '登入失敗');

    // 儲存 Token 與用戶資訊
    localStorage.setItem('ctma_token', data.access_token);
    localStorage.setItem('ctma_user', JSON.stringify(data.user));

    // 依角色導向（admin 和 user 都先進應用層，admin 可從應用層進後台）
    window.location.href = '/app';
  } catch (e) {
    errMsg.textContent = '❌ ' + e.message;
    errMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

// 已登入則直接跳轉
const token = localStorage.getItem('ctma_token');
if (token) {
  fetch('/api/auth/me', {headers: {'Authorization': 'Bearer ' + token}})
    .then(r => r.ok ? r.json() : null)
    .then(u => { if (u) window.location.href = '/app'; })
    .catch(() => {});
}
</script>
</body>
</html>
